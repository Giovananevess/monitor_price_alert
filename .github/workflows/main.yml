name: Monitor de Precos

on:
  schedule:
    - cron: '0 */2 * * *' # Roda a cada 6 horas
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Dá permissão para o bot gravar arquivos no seu repositório
    permissions:
      contents: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install cloudscraper beautifulsoup4 pandas requests python-dotenv


      - name: Rodar Scraper
        # Aqui conectamos os Secrets do GitHub com o seu script Python
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit e Push dos dados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Update: Novo preco capturado e particionado" || exit 0
          git push