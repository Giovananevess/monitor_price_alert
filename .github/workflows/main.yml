name: Monitor de Precos

on:
  schedule:
    - cron: '0 */2 * * *' # Ajustei para rodar a cada 6 horas (conforme seu comentário)
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Permissões cruciais para o bot conseguir escrever no seu repositório
    permissions:
      contents: write

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3
        with:
          persist-credentials: true # Mantém as credenciais para o Push
          fetch-depth: 0            # Baixa todo o histórico para evitar erros de Push

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install cloudscraper beautifulsoup4 pandas requests python-dotenv

      - name: Rodar Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit e Push dos dados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Garante que estamos na branch principal e atualizados
          git pull origin main 
          
          git add data/
          # O "|| exit 0" garante que se não houver mudança no preço, o workflow não dê erro
          git commit -m "📊 Update: Novo preco capturado e particionado [automated]" || exit 0
          git push origin main